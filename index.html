<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Market Insights</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container text-center">
        <h1>Recent market news from around the world</h1>
        <div class="row">
            <div class=" col-md col-lg-6 col-xl h-auto">
                <div class="news h-auto" data-news-id="1">
                    <h4 id="news-1-headline"></h4>
                    <h6 id="news-1-datetime"></h6>
                    <img id="news-1-image" src="" alt="News Image 1" class="img-fluid h-50 p-3">
                    <p id="news-1-summary"></p>
                    <p id="news-1-source"></p>
                    <a id="news-1-url" href="#" target="_blank">Read more...</a>
                </div>
            </div>
            <div class="col-md col-lg-6 col-xl h-auto">
                <div class="news h-auto" data-news-id="2">
                    <h4 id="news-2-headline"></h4>
                    <h6 id="news-2-datetime"></h6>
                    <img id="news-2-image" src="" alt="News Image 2" class="img-fluid h-50 p-3">
                    <p id="news-2-summary"></p>
                    <p id="news-2-source"></p>
                    <a id="news-2-url" href="#" target="_blank">Read more...</a>
                </div>
            </div>
            <div class="col-md col-lg-6 col-xl h-auto">
                <div class="news h-auto" data-news-id="3">
                    <h4 id="news-3-headline"></h4>
                    <h6 id="news-3-datetime"></h6>
                    <img id="news-3-image" src="" alt="News Image 3" class="img-fluid h-50 p-3">
                    <p id="news-3-summary"></p>
                    <p id="news-3-source"></p>
                    <a id="news-3-url" href="#" target="_blank">Read more...</a>
                </div>
            </div>
            <div class="col-md col-lg-6 col-xl h-auto">
                <div class="news h-auto" data-news-id="4">
                    <h4 id="news-4-headline"></h4>
                    <h6 id="news-4-datetime"></h6>
                    <img id="news-4-image" src="" alt="News Image 4" class="img-fluid h-50 p-3">
                    <p id="news-4-summary"></p>
                    <p id="news-4-source"></p>
                    <a id="news-4-url" href="#" target="_blank">Read more...</a>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm col-md-3 col-lg-4">
                <label for="stock-select" class="form-label fs-3">Select a stock:</label>
                <select class="form-select" id="stock-select">
                    <!-- <option value="" selected>Select a stock...</option> -->
                    <option value="AAPL" selected>Apple</option>
                    <option value="MSFT">Microsoft</option>
                    <option value="GOOGL">Google</option>
                </select>
            </div>
            <div class="col-sm col-md-9 col-lg-8" id="stock-display">
                <div id="stock-card">
                    <p id="stock-name"></p>
                    <p id="stock-price"></p>
                    <p id="stock-change"></p>
                    <p id="stock-change-percent"></p>
                    <p id="stock-previous-close"></p>
                </div>
                <p class="text-muted small">Data provided by <a href="https://finnhub.io/" target="_blank">Finnhub API</a>.</p>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-12 col-md-12 col-lg-2 col-xl-2">
                <img id="company-founder-img" src="" class="img-fluid">
            </div>
            <div class="col-sm-12 col-md-12 col-lg-5 col-xl-5">
                <h1 id="company-name"></h1>
                <h3 id="company-founded"></h3>
                <p class="text-justify" id="company-desc"></p>
            </div>
            <div class="col-sm-12 col-md-12 col-lg-5 col-xl-5">
                <h4 id="company-trends"></h4>
                <canvas id="stock-chart" class="w-100 h-auto"></canvas>
                <p class="text-muted small">Data provided by <a href="https://finnhub.io/" target="_blank">Finnhub API</a>.</p>
            </div>
        </div>
        <footer class="text-center mt-4">
            <p>Stock data provided by <a href="https://finnhub.io/" target="_blank">Finnhub API</a>.</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0">
    </script>
    <script src="stock.js" type="module"></script>
</body>

</html>
