<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Stock Market Insights</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container text-center">
        <h1>Recent market news from around the world</h1>
        <div class="row g-4 match-heights">
            <div class="col-md col-lg-6 col-xl">
                <div class="news h-100 d-flex flex-column" data-news-id="1">
                    <div class="news-image-wrapper">
                        <img id="news-1-image" src="" alt="News Image 1" class="img-fluid card-img-top">
                    </div>
                    <div class="card-body d-flex flex-column flex-grow-1 p-3 text-start">
                        <h4 id="news-1-headline" class="fs-5 fw-bold mb-2"></h4>
                        <h6 id="news-1-datetime" class="text-white-50 small mb-3"></h6>
                        <p id="news-1-summary" class="small text-justify flex-grow-1"></p>
                        <p id="news-1-source" class="small text-white-50 m-0 mt-2"></p>
                        <a id="news-1-url" href="#" target="_blank"
                            class="btn btn-sm btn-outline-light mt-3 align-self-start">Read more...</a>
                    </div>
                </div>
            </div>
            <div class="col-md col-lg-6 col-xl">
                <div class="news h-100 d-flex flex-column" data-news-id="2">
                    <div class="news-image-wrapper">
                        <img id="news-2-image" src="" alt="News Image 2" class="img-fluid card-img-top">
                    </div>
                    <div class="card-body d-flex flex-column flex-grow-1 p-3 text-start">
                        <h4 id="news-2-headline" class="fs-5 fw-bold mb-2"></h4>
                        <h6 id="news-2-datetime" class="text-white-50 small mb-3"></h6>
                        <p id="news-2-summary" class="small text-justify flex-grow-1"></p>
                        <p id="news-2-source" class="small text-white-50 m-0 mt-2"></p>
                        <a id="news-2-url" href="#" target="_blank"
                            class="btn btn-sm btn-outline-light mt-3 align-self-start">Read more...</a>
                    </div>
                </div>
            </div>


            <div class="col-md col-lg-6 col-xl">
                <div class="news h-100 d-flex flex-column" data-news-id="3">
                    <div class="news-image-wrapper">
                        <img id="news-3-image" src="" alt="News Image 3" class="img-fluid card-img-top">
                    </div>
                    <div class="card-body d-flex flex-column flex-grow-1 p-3 text-start">
                        <h4 id="news-3-headline" class="fs-5 fw-bold mb-2"></h4>
                        <h6 id="news-3-datetime" class="text-white-50 small mb-3"></h6>
                        <p id="news-3-summary" class="small text-justify flex-grow-1"></p>
                        <p id="news-3-source" class="small text-white-50 m-0 mt-2"></p>
                        <a id="news-3-url" href="#" target="_blank"
                            class="btn btn-sm btn-outline-light mt-3 align-self-start">Read more...</a>
                    </div>
                </div>
            </div>
            <div class="col-md col-lg-6 col-xl">
                <div class="news h-100 d-flex flex-column" data-news-id="4">
                    <div class="news-image-wrapper">
                        <img id="news-4-image" src="" alt="News Image 4" class="img-fluid card-img-top">
                    </div>
                    <div class="card-body d-flex flex-column flex-grow-1 p-3 text-start">
                        <h4 id="news-4-headline" class="fs-5 fw-bold mb-2"></h4>
                        <h6 id="news-4-datetime" class="text-white-50 small mb-3"></h6>
                        <p id="news-4-summary" class="small text-justify flex-grow-1"></p>
                        <p id="news-4-source" class="small text-white-50 m-0 mt-2"></p>
                        <a id="news-4-url" href="#" target="_blank"
                            class="btn btn-sm btn-outline-light mt-3 align-self-start">Read more...</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="row my-5 justify-content-center">
            <div class="col-12 col-md-11 col-lg-10">
                <div class="p-4 rounded-4 shadow-lg custom-dashboard-panel">
                    <div class="row align-items-center">

                        <div class="col-md-5 text-md-start mb-4 mb-md-0 pe-md-4">
                            <label for="stock-select" class="form-label fw-bold mb-2 fs-5 text-white"><i
                                    class="bi bi-graph-up"></i> Select Stock
                                for more information</label>
                            <select class="form-select custom-select-dark" id="stock-select">
                                <option value="AAPL" selected>Apple (AAPL)</option>
                                <option value="MSFT">Microsoft (MSFT)</option>
                                <option value="GOOGL">Google (GOOGL)</option>
                            </select>
                        </div>

                        <div class="col-md-7 border-start-md">
                            <div id="stock-display">
                                <div id="stock-card" class="text-md-start ps-md-4">
                                    <h2 id="stock-name" class="fw-bold mb-2 text-warning"></h2>
                                    <h3 id="stock-price" class="fw-bold mb-3 fs-1"></h3>

                                    <div class="row g-2 text-md-start">
                                        <div class="col-6 small text-white-50" id="stock-change"></div>
                                        <div class="col-6 small text-white-50" id="stock-change-percent"></div>
                                        <div class="col-12 small text-white-50 mt-1" id="stock-previous-close"></div>
                                    </div>
                                </div>
                            </div>
                        </div>

                    </div>
                </div>
                <p class="text-muted small text-end mt-2">Data provided by <a href="https://finnhub.io/" target="_blank"
                        class="text-white-50">Finnhub API</a>.</p>
            </div>
        </div>
        <div class="row">
            <div class="col-sm-12 col-md-12 col-lg-2 col-xl-2" id="company-founder-container">
                <img id="company-founder-img" src="" class="img-fluid">
                <div class="middle">
                    <a href="#" target="_blank" class="text" id="company-founder-name"></a>
                </div>
            </div>
            <div class="col-sm-12 col-md-12 col-lg-5 col-xl-5">
                <h1 id="company-name"></h1>
                <h3 id="company-founded"></h3>
                <p class="text-justify" id="company-desc"></p>
            </div>
            <div class="col-sm-12 col-md-12 col-lg-5 col-xl-5">
                <h4 id="company-trends"></h4>
                <canvas id="stock-chart" class="w-100 h-auto"></canvas>
                <p class="text-muted small">Data provided by <a href="https://finnhub.io/" target="_blank">Finnhub
                        API</a>.</p>
            </div>
        </div>
        <footer class="text-center mt-4">
            <p>Stock data provided by <a href="https://finnhub.io/" target="_blank">Finnhub API</a>.</p>
        </footer>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.0">
    </script>
    <script src="stock.js" type="module"></script>
</body>

</html>
