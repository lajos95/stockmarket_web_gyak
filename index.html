<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .hidden {
            display: none;
        }

        .visible {
            display: block;
        }
    </style>
</head>

<body>
    <div class="container text-center">
        <h1>Bootstrap 5</h1>
        <div class="row">
            <div class="col-sm col-md-3 col-lg-4">
                <select class="form-select" id="stock-select">
                    <option value="" selected>Select a stock...</option>
                    <option value="AAPL">Apple</option>
                    <option value="MSFT">Microsoft</option>
                    <option value="GOOGL">Google</option>
                </select>
            </div>
            <div class="col-sm col-md-9 col-lg-8" id="stock-display">
                <div id="stock-card">
                    <p id="stock-name"></p>
                    <p id="stock-price"></p>
                    <p id="stock-change"></p>
                    <p id="stock-change-percent"></p>
                    <p id="stock-previous-close"></p>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-sm col-md-2 col-lg-2 col-xl-1">
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Voluptas, doloremque.</p>
            </div>
            <div class="col-sm col-md-8 col-lg-8 col-xl-10">
                <h1 id="company-name">Additional content for the main column.</h1>
                <h3 id="company-founded">Additional content for the main column.</h3>
                <p id="company-desc">Additional content for the sidebar.</p>
            </div>
            <div class="col-sm col-md-2 col-lg-2 col-xl-1">
                <p>Additional content for the sidebar.</p>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.min.js"
        integrity="sha384-G/EV+4j2dNv+tEPo3++6LCgdCROaejBqfUeNjuKAiuXbjrxilcCdDz6ZAVfHWe1Y"
        crossorigin="anonymous"></script>
    <script src="stock.js" type="module"></script>
</body>

</html>
